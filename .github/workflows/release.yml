name: Release

# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # SLSA build-provenance attestation
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # stdlib-only: no go.sum, nothing to cache

      - run: go vet ./... && test -z "$(gofmt -l .)" && go test ./...

      - name: Build (linux/amd64, static)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o anjin-intel-linux-amd64 ./cmd/anjin-intel
          sha256sum anjin-intel-linux-amd64 > SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: anjin-intel-linux-amd64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            anjin-intel-linux-amd64 SHA256SUMS \
            --title "${GITHUB_REF_NAME}" --generate-notes
